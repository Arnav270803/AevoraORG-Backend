services:
  postgres:
    image: postgres:16-alpine
    container_name: aevora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aevora
    ports:
      - "5432:5432"
    volumes:
      - aevora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aevora"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aevora_postgres_data:
